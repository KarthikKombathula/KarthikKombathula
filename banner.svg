<svg width="100%" height="260" viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A2BE2">
        <animate attributeName="stop-color" values="#8A2BE2;#6A5ACD;#4B6CB7;#8A2BE2" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#4B6CB7">
        <animate attributeName="stop-color" values="#4B6CB7;#8A2BE2;#6A5ACD;#4B6CB7" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="260" fill="url(#grad)" rx="12"/>

  <text x="50%" y="95" text-anchor="middle" fill="white" font-size="34" font-weight="bold" filter="url(#glow)">
    Lakshmi Karthik Kombathula
  </text>

  <text x="50%" y="140" text-anchor="middle" fill="white" font-size="20">
    Software Developer
  </text>

  <text x="50%" y="175" text-anchor="middle" fill="white" font-size="16">
    Java | DSA | Python | SQL | Web Development
  </text>

</svg>
